name: Daily Job Notification

on:
  schedule:
    - cron: '0 8 * * *'    # 15h chiều GMT+7 (8h UTC)
  workflow_dispatch:        # Cho phép chạy tay

jobs:
  notify:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx python-dotenv loguru

      - name: Send daily notification
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_EMAIL:         ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO:    ${{ secrets.NOTIFY_EMAIL_TO }}
        run: python notify.py
